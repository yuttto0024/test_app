<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>電気電子材料 暗記カード</title>
    <style>
      :root {
        --primary-color: #007bff;
        --bg-color: #f4f7f6;
        --card-bg: #ffffff;
        --text-main: #333333;
        --text-sub: #666666;
        --ans-color: #d32f2f;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background-color: var(--bg-color);
        margin: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
        color: var(--text-main);
      }

      header {
        background-color: var(--primary-color);
        color: white;
        padding: 15px 20px;
        text-align: center;
        font-size: 1.4rem;
        font-weight: bold;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      #progress {
        font-size: 1.2rem;
        background: rgba(255, 255, 255, 0.2);
        padding: 5px 15px;
        border-radius: 20px;
      }

      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        width: 100%;
        box-sizing: border-box;
      }

      .card {
        background: var(--card-bg);
        width: 100%;
        max-width: 800px; /* PCでは適度な幅で止める */
        min-height: 50vh; /* 画面の高さの半分を最低保証 */
        border-radius: 16px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 40px;
        box-sizing: border-box;
        cursor: pointer;
        transition:
          transform 0.1s,
          box-shadow 0.1s;
        text-align: center;
        position: relative;
      }

      .card:active {
        transform: scale(0.99);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }

      .label {
        font-size: 1.2rem;
        font-weight: bold;
        color: var(--text-sub);
        margin-bottom: 20px;
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
      }

      .content {
        font-size: 1.8rem; /* 文字を大幅に拡大 */
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-word;
        margin-top: 30px;
      }

      /* 解答表示時のスタイル */
      .card.show-answer {
        border: 3px solid #28a745;
      }
      .card.show-answer .content {
        color: var(--ans-color);
        font-weight: 500;
      }
      .card.show-answer .label {
        color: #28a745;
      }

      .hint-text {
        font-size: 1rem;
        color: var(--text-sub);
        margin-top: 15px;
      }

      .controls {
        display: flex;
        justify-content: center;
        gap: 15px;
        width: 100%;
        max-width: 800px;
        padding: 0 20px 30px 20px;
        box-sizing: border-box;
        margin: 0 auto;
      }

      button {
        background-color: #e4e6eb;
        color: #333;
        border: none;
        padding: 20px;
        border-radius: 12px;
        font-size: 1.4rem;
        font-weight: bold;
        cursor: pointer;
        flex: 1;
        touch-action: manipulation; /* ダブルタップズーム防止 */
      }

      button:active {
        background-color: #d8dadf;
      }

      /* スマホ用の調整 */
      @media (max-width: 600px) {
        .content {
          font-size: 1.4rem;
        }
        .card {
          padding: 30px 20px;
        }
        button {
          padding: 15px;
          font-size: 1.2rem;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <span>電気電子材料 対策</span>
      <div id="progress">1 / 41</div>
    </header>

    <main>
      <div class="card" id="flashcard" onclick="toggleCard()">
        <div class="label" id="card-label">【問題】 タップして解答を表示</div>
        <div class="content" id="card-content">読み込み中...</div>
      </div>
      <div class="hint-text">カード部分をタップすると答えが出ます</div>
    </main>

    <div class="controls">
      <button onclick="prevCard()">◀ 前へ</button>
      <button onclick="nextCard()">次へ ▶</button>
    </div>

    <script>
      const data = [
        {
          q: "【問1】\n各組織のスケール\n・ナノ組織\n・マクロ組織\n・ミクロ組織",
          a: "ナノ組織：10^(-10) ~10^{-7}\nマクロ組織：10^(-7) ~10^(-3)\nミクロ組織：10^(-3) ~10^(0)",
        },
        {
          q: "【問1】\n状態変化の名称\n・気体と個体\n・気体と液体\n・液体と個体",
          a: "気体と個体：凝華（気体が液体にならず個体に）・昇華\n気体と液体：蒸発/気化・液化/凝縮\n液体と個体：凝固・融解",
        },
        {
          q: "【問1】\nエネルギー変換の入出力\n・電界(入力) → ？\n・磁界(入力) → ？\n・熱(入力) → ？(電気出力)\n・熱(入力) → ？(温度出力)",
          a: "電界（入力） → 電気光学効果（光出力）\n磁界（入力） → 磁気電気効果・磁気抵抗効果（電気出力）\n熱（入力） → 圧電効果・熱電効果（電気出力）\n熱（入力） → 比熱（温度出力）",
        },
        {
          q: "【問2】\n①金属元素の5つの特徴",
          a: "・電気伝導性\n・熱伝導性\n・陽イオンになりやすい\n・室温では大部分が個体\n・密度が高い\n・光沢がある",
        },
        {
          q: "【問2】\n②半金属元素の3つの特徴",
          a: "・陽イオンにも陰イオンにもなる\n・金属と非金属の中間の性質\n・電気的には半導体",
        },
        {
          q: "【問2】\n③非金属元素の3つの特徴",
          a: "・熱や光をほとんど伝えない\n・光沢がない\n・室温は三態",
        },
        {
          q: "【問2】\n非金属と非金属 or 半金属と非金属が統合するのは何結合か。結合例は？",
          a: "共有結合\n例：HCL",
        },
        {
          q: "【問2】\n金属と非金属が統合するのは何結合か。結合例は？",
          a: "イオン結合\n例：LiF",
        },
        {
          q: "【問2】\n金属と金属が統合するのは何結合か。結合例は？",
          a: "金属結合\n例：Ag",
        },
        {
          q: "【問2】\nエネルギーバンド構造について\n半金属・金属・絶縁帯の分類はどう見るか",
          a: "伝導帯、禁止帯、価電子帯でみる\n\n（※詳細は資料の図を参照）",
        },
        {
          q: "【問2】\n以下の結晶構造をとる物質の例\n・体心立方格子\n・面心立方格子\n・六方最密構造\n・ダイヤモンド構造\n・NaCl構造",
          a: "体心立方格子：Li, Na\n面心立方格子：Al, Ca\n六方最密構造：Mg, Ca\nダイヤモンド構造：ダイヤモンド, Si\nNaCl構造：NaCl, MgO",
        },
        {
          q: "【問2】\n原子同士の結合について、核間距離と電子のエネルギーのグラフの「縦軸」と「横軸」は？",
          a: "縦軸：電子のエネルギー\n横軸：核間距離r0 ~ r∞\n\n（※グラフの形自体は資料参照）",
        },
        {
          q: "【問3】\nマティッセンの式と、導電体・半導体・絶縁体の抵抗値の温度依存性",
          a: "式：ρ = β + αT\n\n大きさ：絶縁体 > 半導体 > 導体\n（※グラフ参照）",
        },
        {
          q: "【問3】\nNTCサーミスタを使った回路(R_THとRが直列)\nV_in = 5[V]、R_TH = 10 → 5[Ω]、R = 5[Ω]\n出力電圧V_outの計算式は？",
          a: "V_out = V_in × ( R / (R_TH + R) )",
        },
        {
          q: "【問3】\n結晶の種類を3つ挙げよ",
          a: "・単結晶\n・多結晶\n・アモルファス",
        },
        {
          q: "【問3】\n抵抗器の分類\n「炭素系」の種類を挙げよ",
          a: "・皮膜系（熱分解析出皮膜）\n・コンポジッション（炭素粉末と樹脂）\n・ソリッド系：10~20MΩ",
        },
        {
          q: "【問3】\n抵抗器の分類\n「金属系」の種類を挙げよ",
          a: "・皮膜系（薄膜系）\n・金属酸化物系\n・厚膜系\n・巻線系高周波用標準抵抗",
        },
        {
          q: "【問5】\n発光波長λとエネルギーギャップE_gの関係式",
          a: "E_g = hc / λ",
        },
        {
          q: "【問5】\nノーベル物理学賞に繋がった3つの基本的ブレークスルー技術",
          a: "・p型GaN：Mgドープと電子線照射によるアニーリング\n・n型GaN：Siドープによる抵抗率制御\n・GaNの単結晶：バッファ層：サファイア上の低温堆積バッファ層",
        },
        {
          q: "【問5】\nなぜ天野先生はGaN単結晶薄膜の生成に成功したか",
          a: "サファイア基板の上に「低温堆積バッファ層（AlN）」を形成したため。\n\n（加熱装置の不具合により、偶然低い温度でバッファ層を作製してしまったことが成功のきっかけ）",
        },
        {
          q: "【問5】\nなぜ天野先生はp型GaN単結晶薄膜の生成に成功したか",
          a: "GaNに「Mg（マグネシウム）をドープ」し、さらに「電子線照射によるアニーリング」を行ったため。\n\n（Mgドープだけではp型にならなかったものの、電子顕微鏡で観察(電子線を照射)した後の試料が発光することに偶然気づいたのがきっかけ）",
        },
        {
          q: "【問5】\nなぜ天野先生はn型GaN単結晶薄膜の生成に成功したか",
          a: "サファイア基板の上に「低温堆積バッファ層（AlN）」を形成したため。\n\n（不純物や欠陥を少なくしたGaNに「Si（シリコン）をドープ」し、抵抗率を制御したため。）",
        },
        {
          q: "【問6】\n電気双極子モーメントpの式\n・四角の方\n・直線",
          a: "四角の方：p_2 = qa_2, p_1 = qa_1\n直線：p = √2qa\n\n（※資料の図を参照）",
        },
        {
          q: "【問6】\n電子分極とはどんな分極か",
          a: "電圧を加えることで、中性な原子内の「電子雲」と「原子核」の位置に偏り（ずれ）が生じて起こる分極。",
        },
        {
          q: "【問6】\n原子分極とはどんな分極か",
          a: "電圧を加えることで、イオン性結晶内の「正イオン」と「負イオン」が元の位置からずれることで起こる分極。",
        },
        {
          q: "【問6】\n双極子分極とはどんな分極か",
          a: "水のように「電気双極子」を元々持っている材料に電圧を加えることで起こる分極。",
        },
        {
          q: "【問6】\nチタン酸バリウム（BaTiO4）の特徴4つ",
          a: "・比誘電率が大きい\n・自発分極を持つ\n・自発分極の向きを外部電界によって反転させることのできる強誘電性\n・イオンサイズの大きいBa^2+とイオンサイズが小さいTi^4+の組み合わせでイオン変位が大きい",
        },
        {
          q: "【問6】\nタッチパネル各場所に用いられる代表的な材料3つ",
          a: "・TOP材料：感度の面でできるだけ誘電率が高い方が望ましい：ガラス（SiO_2（アモルファス））\n・粘着質：液晶ポリマーや変性ポリイミド\n・電極：高透過材料が望ましい：ITO（I_n2 O_3 : Sn）",
        },
        {
          q: "【問6】\n水晶のSAW波の音速v=3100[m/s]の時、2[GHZ]のスマホの電磁波を受信するための電極間隔d",
          a: "v = fλ より\nλ = 3100 / 2 × 10^9\n  = 1500 × 10^-9\n\nd = λ/2",
        },
        {
          q: "【問6】\nSAWフィルタに用いられる代表的な圧電材料を3つ",
          a: "・水晶（SiO_2(結晶)）\n・タンタル酸リチウム（LiTaO_3）\n・ニオブ酸リチウム（LiNbO_3）",
        },
        {
          q: "【問6】\nSAWフィルタに用いる、圧電材料に求められる特性5つ",
          a: "・SAW伝播速度vが小さい\n・SAW遅延時間温度計数が小さい\n・SAW伝播損失が小さい\n・誘電率εが大きくない\n・電気機械結合係数k_s ^2が大きい",
        },
        {
          q: "【その他】\n光学的性質の応用例\n・蛍光材料\n・光学返還材料",
          a: "蛍光材料：LED（発光ダイオード）\n光学返還材料：液晶",
        },
        {
          q: "【その他】\n電気的性質の応用例\n・イオン導電体\n・半導体材料",
          a: "イオン導電体：電池用個体電解質、燃料電池セル\n半導体材料：半導体",
        },
        {
          q: "【その他】\n磁気的性質の応用例\n・磁性材料\n・磁歪材料",
          a: "磁性材料：モーター（磁石）、磁気記録媒体\n磁歪材料：圧力センサー、ソナー",
        },
        {
          q: "【その他】\n単結晶とは何か。例は？",
          a: "全体が一つの結晶で形成され、欠損や不純物のない結晶。\n（例：シリコン、サファイヤ、水晶）",
        },
        {
          q: "【その他】\n多結晶とは何か。例は？",
          a: "小さな単結晶領域と結晶粒の集合体。\n（例：多くの金属、焼結体セラミック）",
        },
        {
          q: "【その他】\n非結晶とは何か。例は？",
          a: "3次元的には規則的、周期的に並んでいるが、長距離にわたって規則性が保たれていない\n（例：ガラス、アモルファスシリコン、プラスチック）",
        },
        {
          q: "【その他】\nスマホにNTCサーミスタが使われている理由(3箇所)",
          a: "【LED保護カメラモジュール】\nNTCサーミスタを用い、LEDの電流を制限し、発熱を抑える。\n\n【温度センサ内蔵水晶振動素子】\nこの水晶をサーミスタでできたセンサの素子が温度を検知する。\n\n【バッテリーバック】\nNTCサーミスタを用い、バッテリーが高温になったら、電流を制限、発熱を抑える。",
        },
        {
          q: "【その他】\nカラーコードの抵抗値と誤差率\n・茶緑橙金\n・茶橙緑黒茶",
          a: "茶緑橙金：15 × 10^3 [Ω] 誤差率±5%\n茶橙緑黒茶：135 [Ω] 誤差率±1%",
        },
        {
          q: "【その他】\nコンデンサとは何か。静電容量C[F]で表せ。また、用語。",
          a: "C = εS / d\n\n用語：電気力線、誘電率ε、+Q、-Q",
        },
        {
          q: "【その他】\nSAWフィルタの基本動作（触れる検出）",
          a: "・触れる\n・人体は設置導体と見なせるため、『静電容量』が発生\n・静電容量は、新たな静電容量が『発生した分だけ』変化\n・この変化が、どの『電極間で発生したか』を検出すれば、検出できる",
        },
        {
          q: "【その他】\nSAWフィルタの基本動作（共振）",
          a: "圧電素子上の形電極の電極間隔dが『SAWの班波長λ/2』の時、周波数『f = v/λ』の交流電圧を印加\n\n半波長が、『IDTの電極間隔d』と等しいものだけ『共振』し、電極間に『交流電圧』として観測。",
        },
      ];

      let currentIndex = 0;
      let showingAnswer = false;

      const cardLabel = document.getElementById("card-label");
      const cardContent = document.getElementById("card-content");
      const progress = document.getElementById("progress");
      const flashcard = document.getElementById("flashcard");

      function updateCard() {
        showingAnswer = false;
        flashcard.classList.remove("show-answer");
        cardLabel.innerText = "【問題】 タップして解答を表示";
        cardContent.innerText = data[currentIndex].q;
        progress.innerText = `${currentIndex + 1} / ${data.length}`;

        // スマホで文字が多すぎる場合は少しフォントを下げる処理
        if (data[currentIndex].q.length > 80 && window.innerWidth < 600) {
          cardContent.style.fontSize = "1.2rem";
        } else if (window.innerWidth < 600) {
          cardContent.style.fontSize = "1.4rem";
        } else {
          cardContent.style.fontSize = "1.8rem";
        }
      }

      function toggleCard() {
        showingAnswer = !showingAnswer;
        if (showingAnswer) {
          flashcard.classList.add("show-answer");
          cardLabel.innerText = "【解答】";
          cardContent.innerText = data[currentIndex].a;

          if (data[currentIndex].a.length > 80 && window.innerWidth < 600) {
            cardContent.style.fontSize = "1.2rem";
          }
        } else {
          updateCard();
        }
      }

      function nextCard() {
        if (currentIndex < data.length - 1) {
          currentIndex++;
          updateCard();
        }
      }

      function prevCard() {
        if (currentIndex > 0) {
          currentIndex--;
          updateCard();
        }
      }

      // 初期化
      updateCard();
    </script>
  </body>
</html>
