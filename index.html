<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <script>

    <style>
      :root {
        --primary-color: #007bff;
        --bg-color: #f4f7f6;
        --card-bg: #ffffff;
        --text-main: #333333;
        --text-sub: #666666;
        --ans-color: #d32f2f;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background-color: var(--bg-color);
        margin: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
        color: var(--text-main);
      }

      header {
        background-color: var(--primary-color);
        color: white;
        padding: 15px 20px;
        text-align: center;
        font-size: 1.4rem;
        font-weight: bold;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      #progress {
        font-size: 1.2rem;
        background: rgba(255, 255, 255, 0.2);
        padding: 5px 15px;
        border-radius: 20px;
      }

      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        width: 100%;
        box-sizing: border-box;
      }

      .card {
        background: var(--card-bg);
        width: 100%;
        max-width: 800px;
        min-height: 50vh;
        border-radius: 16px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 40px;
        box-sizing: border-box;
        cursor: pointer;
        transition:
          transform 0.1s,
          box-shadow 0.1s;
        text-align: center;
        position: relative;
      }

      .card:active {
        transform: scale(0.99);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }

      .label {
        font-size: 1.2rem;
        font-weight: bold;
        color: var(--text-sub);
        margin-bottom: 20px;
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
      }

      .content {
        font-size: 1.8rem;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-word;
        margin-top: 30px;
      }

      /* 解答表示時のスタイル */
      .card.show-answer {
        border: 3px solid #28a745;
      }
      .card.show-answer .content {
        color: var(--ans-color);
        font-weight: 500;
      }
      .card.show-answer .label {
        color: #28a745;
      }

      .hint-text {
        font-size: 1rem;
        color: var(--text-sub);
        margin-top: 15px;
      }

      .controls {
        display: flex;
        justify-content: center;
        gap: 15px;
        width: 100%;
        max-width: 800px;
        padding: 0 20px 30px 20px;
        box-sizing: border-box;
        margin: 0 auto;
      }

      button {
        background-color: #e4e6eb;
        color: #333;
        border: none;
        padding: 20px;
        border-radius: 12px;
        font-size: 1.4rem;
        font-weight: bold;
        cursor: pointer;
        flex: 1;
        touch-action: manipulation;
      }

      button:active {
        background-color: #d8dadf;
      }

      @media (max-width: 600px) {
        .content {
          font-size: 1.4rem;
        }
        .card {
          padding: 30px 20px;
        }
        button {
          padding: 15px;
          font-size: 1.2rem;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <span>電気電子材料 対策</span>
      <div id="progress">1 / 41</div>
    </header>

    <main>
      <div class="card" id="flashcard" onclick="toggleCard()">
        <div class="label" id="card-label">【問題】 タップして解答を表示</div>
        <div class="content" id="card-content">読み込み中...</div>
      </div>
      <div class="hint-text">カード部分をタップすると答えが出ます</div>
    </main>

    <div class="controls">
      <button onclick="prevCard()">◀ 前へ</button>
      <button onclick="nextCard()">次へ ▶</button>
    </div>

    <script>
      const data = [
        {
          q: "【問1】\n各組織のスケール [m]\n・ナノ組織\n・マクロ組織\n・ミクロ組織",
          a: "ナノ組織：$10^{-10} \\sim 10^{-7}$\nミクロ組織：$10^{-7} \\sim 10^{-3}$\nマクロ組織：$10^{-3} \\sim 10^{0}$",
        },
        {
          q: "【問1】\n状態変化の名称\n・気体と固体\n・気体と液体\n・液体と固体",
          a: "気体と固体：凝華（液体を経由せず直接固体へ）・昇華\n気体と液体：蒸発 / 気化・液化 / 凝縮\n液体と固体：凝固・融解",
        },
        {
          q: "【問1】\nエネルギー変換の入出力\n・電界(入力) → ？\n・磁界(入力) → ？\n・熱(入力) → ？(電気出力)\n・熱(入力) → ？(温度出力)",
          a: "電界（入力） → 電気光学効果（光出力）\n磁界（入力） → 磁気電気効果・磁気抵抗効果（電気出力）\n熱（入力） → 圧電効果・熱電効果（電気出力）\n熱（入力） → 比熱（温度出力）",
        },
        {
          q: "【問2】\n①金属元素の主な特徴 (5つ以上)",
          a: "・電気伝導性\n・熱伝導性\n・陽イオンになりやすい\n・室温では大部分が固体\n・密度が高い\n・光沢がある",
        },
        {
          q: "【問2】\n②半金属元素の特徴 (3つ)",
          a: "・陽イオンにも陰イオンにもなる\n・金属と非金属の中間の性質\n・電気的には半導体",
        },
        {
          q: "【問2】\n③非金属元素の特徴 (3つ)",
          a: "・熱や光をほとんど伝えない\n・光沢がない\n・室温で三態をとる",
        },
        {

        },
        {
          q: "【問2】\n金属と非金属が結合する形式は？ 結合例は？",
          a: "イオン結合\n例：$\\text{LiF}$",
        },
        {
          q: "【問2】\n金属同士が結合する形式は？ 結合例は？",
          a: "金属結合\n例：$\\text{Ag}$",
        },
        {
          q: "【問2】\nエネルギーバンド構造において、半金属・金属・絶縁体は何を見て分類するか",
          a: "伝導帯、禁制帯（バンドギャップ）、価電子帯の位置関係と広さ\n\n（※詳細は資料の図を参照）",
        },
        {
          q: "【問2】\n以下の結晶構造をとる物質の例\n・体心立方格子\n・面心立方格子\n・六方最密構造\n・ダイヤモンド構造\n・NaCl構造",
          a: "体心立方格子：$\\text{Li}, \\text{Na}$\n面心立方格子：$\\text{Al}, \\text{Ca}$\n六方最密構造：$\\text{Mg}, \\text{Co}$\nダイヤモンド構造：ダイヤモンド, $\\text{Si}$\nNaCl構造：$\\text{NaCl}, \\text{MgO}$",
        },
        {
          q: "【問2】\n原子同士の結合における、核間距離と電子のエネルギーのグラフ\n「縦軸」と「横軸」はそれぞれ何か？",
          a: "縦軸：電子のエネルギー\n横軸：核間距離 $r_0 \\sim r_\\infty$\n\n（※曲線の形状は必ず資料を参照すること）",
        },
        {
          q: "【問3】\nマティッセンの式と、導電体・半導体・絶縁体の抵抗率 $\\rho$ の大小関係",
          a: "式：$\\rho = \\beta + \\alpha T$\n\n抵抗率の大きさ：絶縁体 $>$ 半導体 $>$ 導体\n（※温度依存性のグラフ形状は資料参照）",
        },
        {
          q: "【問3】\nNTCサーミスタ $R_{\\text{TH}}$ と抵抗 $R$ の直列回路\n$V_{\\text{in}} = 5\\text{ [V]}$、$R = 5\\text{ [\\Omega]}$\n$R_{\\text{TH}}$ が $10\\text{ [\\Omega]}$ から $5\\text{ [\\Omega]}$ に変化した際の出力電圧 $V_{\\text{out}}$ の計算式は？",
          a: "$V_{\\text{out}} = V_{\\text{in}} \\times \\frac{R}{R_{\\text{TH}} + R}$",
        },
        {
          q: "【問3】\n結晶の種類を3つ挙げよ",
          a: "・単結晶\n・多結晶\n・アモルファス (非晶質)",
        },
        {
          q: "【問3】\n抵抗器の分類\n「炭素系」の種類を挙げよ",
          a: "・炭素皮膜系（熱分解炭素皮膜）\n・ソリッドコンポジション（炭素粉末と樹脂の混合）\n・ソリッド系：$10 \\sim 20\\text{ [M\\Omega]}$",
        },
        {
          q: "【問3】\n抵抗器の分類\n「金属系」の種類を挙げよ",
          a: "・金属皮膜系（薄膜系）\n・金属酸化物系\n・厚膜系\n・巻線系（高周波用標準抵抗など）",
        },
        {
          q: "【問5】\n発光波長 $\\lambda$ とエネルギーギャップ $E_g$ の関係式",
          a: "$E_g = \\frac{hc}{\\lambda}$",
        },
        {
          q: "【問5】\nノーベル物理学賞に繋がった $\\text{GaN}$ の3つのブレークスルー技術",
          a: "・p型 $\\text{GaN}$：$\\text{Mg}$ ドープと電子線照射によるアニーリング\n・n型 $\\text{GaN}$：$\\text{Si}$ ドープによる抵抗率制御\n・$\\text{GaN}$ の単結晶：サファイア基板上の低温堆積バッファ層",
        },
        {
          q: "【問5】\nなぜ天野教授は $\\text{GaN}$ 単結晶薄膜の生成に成功したか",
          a: "サファイア基板の上に「低温堆積バッファ層（$\\text{AlN}$）」を形成したため。\n\n（加熱装置の不具合により、偶然低い温度でバッファ層を作製してしまったことが成功のきっかけ）",
        },
        {
          q: "【問5】\nなぜ天野教授は p型 $\\text{GaN}$ 単結晶薄膜の生成に成功したか",
          a: "$\\text{GaN}$ に「$\\text{Mg}$（マグネシウム）」をドープし、さらに「電子線照射によるアニーリング」を行ったため。\n\n（$\\text{Mg}$ ドープだけではp型にならなかったが、電子顕微鏡で観察(電子線を照射)した後の試料が発光することに偶然気づいたのがきっかけ）",
        },
        {
          q: "【問5】\nなぜ天野教授は n型 $\\text{GaN}$ 単結晶薄膜の生成に成功したか",
          a: "サファイア基板の上に「低温堆積バッファ層（$\\text{AlN}$）」を形成したため。\n\n（不純物や欠陥を少なくした $\\text{GaN}$ に「$\\text{Si}$（シリコン）」をドープし、抵抗率を制御したため）",
        },
        {
          q: "【問6】\n電気双極子モーメント $p$ の式\n・四角の配置\n・直線の配置",
          a: "四角の配置：$p_2 = qa_2, \\; p_1 = qa_1$\n直線の配置：$p = \\sqrt{2}qa$\n\n（※資料の図を参照）",
        },
        {
          q: "【問6】\n電子分極とはどのような分極か",
          a: "電圧を加えることで、中性な原子内の「電子雲」と「原子核」の位置に偏り（ずれ）が生じて起こる分極。",
        },
        {
          q: "【問6】\n原子分極とはどのような分極か",
          a: "電圧を加えることで、イオン性結晶内の「正イオン」と「負イオン」が元の位置からずれることで起こる分極。",
        },
        {
          q: "【問6】\n双極子分極とはどのような分極か",
          a: "水のように「電気双極子」を元々持っている材料に電圧を加えることで向きが揃う分極。",
        },
        {
          q: "【問6】\nチタン酸バリウム（$\\text{BaTiO}_3$）の特徴4つ",
          a: "・比誘電率が大きい\n・自発分極を持つ\n・自発分極の向きを外部電界によって反転させることができる強誘電性\n・イオンサイズの大きい $\\text{Ba}^{2+}$ と小さい $\\text{Ti}^{4+}$ の組み合わせでイオン変位が大きい",
        },
        {
          q: "【問6】\nタッチパネル各場所に用いられる代表的な材料3つ",
          a: "・TOP材料：感度の面でできるだけ誘電率が高い方が望ましい（ガラス等の非晶質 $\\text{SiO}_2$）\n・粘着層（粘着質はアツジンさん）：液晶ポリマーや変性ポリイミド\n・電極：高透過材料が望ましい（$\\text{ITO}$ などの $\\text{In}_2\\text{O}_3 : \\text{Sn}$）",
        },
        {
          q: "【問6】\n水晶の SAW波の音速 $v = 3100\\text{ [m/s]}$ の時、$2\\text{ [GHz]}$ のスマホの電磁波を受信するための電極間隔 $d$ は？",
          a: "$v = f\\lambda$ より\n$\\lambda = \\frac{3100}{2 \\times 10^9} = 1550 \\times 10^{-9}\\text{ [m]}$\n\n電極間隔 $d = \\frac{\\lambda}{2}$",
        },
        {
          q: "【問6】\nSAWフィルタに用いられる代表的な圧電材料を3つ",
          a: "・水晶（$\\text{SiO}_2$ 結晶）\n・タンタル酸リチウム（$\\text{LiTaO}_3$）\n・ニオブ酸リチウム（$\\text{LiNbO}_3$）",
        },
        {
          q: "【問6】\nSAWフィルタに用いる、圧電材料に求められる特性5つ",
          a: "・SAW伝播速度 $v$ が小さい\n・SAW遅延時間温度係数が小さい\n・SAW伝播損失が小さい\n・誘電率 $\\varepsilon$ が大きくない\n・電気機械結合係数 $k_s^2$ が大きい",
        },
        {
          q: "【その他】\n光学的性質の応用例\n・蛍光材料\n・光学変換材料",
          a: "蛍光材料：$\\text{LED}$（発光ダイオード）\n光学変換材料：液晶",
        },
        {
          q: "【その他】\n電気的性質の応用例\n・イオン導電体\n・半導体材料",
          a: "イオン導電体：電池用固体電解質、燃料電池セル\n半導体材料：半導体",
        },
        {
          q: "【その他】\n磁気的性質の応用例\n・磁性材料\n・磁歪材料",
          a: "磁性材料：モーター（磁石）、磁気記録媒体\n磁歪材料：圧力センサー、ソナー",
        },
        {
          q: "【その他】\n単結晶とは何か。またその例は？",
          a: "全体が一つの結晶で形成され、欠陥や不純物のない結晶。\n（例：シリコン、サファイア、水晶）",
        },
        {
          q: "【その他】\n多結晶とは何か。またその例は？",
          a: "小さな単結晶領域と結晶粒の集合体。\n（例：多くの金属、焼結体セラミック）",
        },
        {
          q: "【その他】\n非結晶 (アモルファス) とは何か。またその例は？",
          a: "3次元的には長距離にわたる規則性・周期性が保たれていない状態。\n（例：ガラス、アモルファスシリコン、プラスチック）",
        },
        {
          q: "【その他】\nスマホにNTCサーミスタが使われている理由 (3箇所)",
          a: "【LED保護カメラモジュール】\nLEDの電流を制限し、発熱を抑える。\n\n【温度センサ内蔵水晶振動素子】\n水晶付近のサーミスタでできたセンサ素子が温度を検知する。\n\n【バッテリーパック】\nバッテリーが高温になった際、電流を制限して発熱を抑える。",
        },
        {
          q: "【その他】\nカラーコードの抵抗値と誤差率\n・茶緑橙金\n・茶橙緑黒茶",
          a: "茶緑橙金：$15 \\times 10^3\\text{ [\\Omega]}$ 誤差率 $\\pm 5\\%$\n茶橙緑黒茶：$135\\text{ [\\Omega]}$ 誤差率 $\\pm 1\\%$",
        },
        {
          q: "【その他】\nコンデンサとは何か。静電容量 $C\\text{ [F]}$ を表す公式と、関連用語を挙げよ",
          a: "$C = \\frac{\\varepsilon S}{d}$\n\n用語：電気力線、誘電率 $\\varepsilon$、$+Q$、$-Q$",
        },
        {
          q: "【その他】\nタッチパネル等の基本動作（接触の検出原理）",
          a: "・人体は接地導体と見なせるため、画面に触れると新たな『静電容量』が発生する。\n・静電容量は、新たに『発生した分だけ』変化する。\n・この変化が、どの『電極間で発生したか』を検出すれば、タッチ位置を特定できる。",
        },
        {
          q: "【その他】\nSAWフィルタの基本動作（共振の原理）",
          a: "圧াবলী素子上の櫛形電極の電極間隔 $d$ が『SAWの半波長 $\\lambda / 2$』の時、周波数 $f = \\frac{v}{\\lambda}$ の交流電圧を印加する。\n\n半波長が『電極間隔 $d$』と等しい波だけが『共振』し、電極間に『交流電圧』として観測される。",
        },
      ];

      let currentIndex = 0;
      let showingAnswer = false;

      const cardLabel = document.getElementById("card-label");
      const cardContent = document.getElementById("card-content");
      const progress = document.getElementById("progress");
      const flashcard = document.getElementById("flashcard");

      // MathJaxが読み込まれている場合のみ再レンダリングを促す
      function typesetMath() {
        if (
          window.MathJax &&
          typeof window.MathJax.typesetPromise === "function"
        ) {
          MathJax.typesetPromise([cardContent]).catch((err) =>
            console.log(err),
          );
        }
      }

      function updateCard() {
        showingAnswer = false;
        flashcard.classList.remove("show-answer");
        cardLabel.innerText = "【問題】 タップして解答を表示";
        cardContent.innerHTML = data[currentIndex].q;
        progress.innerText = `${currentIndex + 1} / ${data.length}`;

        if (data[currentIndex].q.length > 80 && window.innerWidth < 600) {
          cardContent.style.fontSize = "1.2rem";
        } else if (window.innerWidth < 600) {
          cardContent.style.fontSize = "1.4rem";
        } else {
          cardContent.style.fontSize = "1.8rem";
        }
        typesetMath();
      }

      function toggleCard() {
        showingAnswer = !showingAnswer;
        if (showingAnswer) {
          flashcard.classList.add("show-answer");
          cardLabel.innerText = "【解答】";
          cardContent.innerHTML = data[currentIndex].a;

          if (data[currentIndex].a.length > 80 && window.innerWidth < 600) {
            cardContent.style.fontSize = "1.2rem";
          }
        } else {
          updateCard();
        }
        typesetMath();
      }

      function nextCard() {
        if (currentIndex < data.length - 1) {
          currentIndex++;
          updateCard();
        }
      }

      function prevCard() {
        if (currentIndex > 0) {
          currentIndex--;
          updateCard();
        }
      }

      updateCard();
