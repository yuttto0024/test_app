<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>単語帳アプリ</title>
    <script>
      MathJax = {
        tex: {
          inlineMath: [
            ["$", "$"],
            ["\\(", "\\)"],
          ],
        },
      };
    </script>
    <script
      id="MathJax-script"
      async
      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"
    ></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header>
      <span class="header-title">単語帳アプリ</span>
      <div class="header-actions">
        <button id="back-to-selection" class="secondary">単語帳一覧</button>
        <input
          id="card-jump-num"
          type="number"
          min="1"
          placeholder="カード番号"
          style="width: 96px; margin-left: 8px"
          aria-label="カード番号"
        />
        <button id="card-jump-button">カードへ移動</button>
        <div id="progress">0 / 0</div>
      </div>
    </header>

    <main>
      <div id="deck-selection" class="panel">
        <div class="selection-hero">
          <div class="eyebrow">Study Decks</div>
          <h1>単語帳を選んで学習しよう</h1>
          <p>
            PCでもスマホでも読みやすいレイアウトで、テーマごとにカードを進められます。
          </p>
        </div>
        <div id="deck-list" class="deck-list"></div>
      </div>

      <div id="study-view" class="panel hidden">
        <div class="card" id="flashcard">
          <div class="label" id="card-label">【問題】 タップして解答を表示</div>
          <div class="content" id="card-content">読み込み中...</div>
        </div>
        <div class="hint-text">カード部分をタップすると答えが出ます</div>
        <div class="controls">
          <button id="prev-button">◀ 前へ</button>
          <button id="next-button">次へ ▶</button>
        </div>
        <div class="hint-text" id="deck-title"></div>
      </div>
    </main>

    <script src="./decks.js"></script>
    <script src="./decks/electronic-materials.js"></script>
    <script src="./decks/plasma-engineering.js"></script>
    <script src="./decks/electrical-electronics-final.js"></script>
    <script src="./decks/robotics.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
